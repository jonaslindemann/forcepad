name: Feature request
description: Suggest a ForcePAD improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow, teaching need, or analysis task would this help?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention any workaround or different approach.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Sketching and editing
        - Forces and constraints
        - Results visualization
        - Topology optimisation
        - Examples and teaching material
        - Build and packaging
        - Documentation
        - Other
