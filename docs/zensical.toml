[project]
site_name = "ForcePAD - A sketch-based finite element analysis tool"
site_description = "ForcePAD is an educational sketch-based 2D finite element analysis application developed at Structural Mechanics at Lund University."
site_author = "Jonas Lindemann"
site_url = "https://jonaslindemann.github.io/forcepad/"
repo_url = "https://github.com/jonaslindemann/forcepad"
copyright = "Copyright &copy; 2026 Jonas Lindemann"

nav = [
  { "Home" = "index.md" },
  { "Get Started" = [
    { "About" = "about.md" },
    { "Download" = "download.md" },
  ] },
  { "User Guide" = [
    { "Introduction" = "use.md" },
    { "Sketch Mode" = "sketch-mode.md" },
    { "Physics Mode" = "physics-mode.md" },
    { "Action Mode" = "action-mode.md" },
  ] },
  { "Project" = [
    { "Develop" = "develop.md" },
    { "Links" = "links.md" },
    { "Contact" = "contact.md" },
    { "Privacy" = "privacy.md" },
  ] },
]

extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
  "header.autohide",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.font]
text = "Noto Sans"
code = "Roboto Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "default"
primary = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "slate"
primary = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/jonaslindemann/forcepad"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.attr_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
